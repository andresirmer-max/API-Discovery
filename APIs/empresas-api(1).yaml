x-ibm-configuration:
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  assembly:
    execute:
      - map:
          version: 2.0.0
          title: map
          inputs: {}
          outputs:
            Accept:
              schema:
                type: string
              variable: message.headers.accept
          actions:
            - set: Accept
              default: '*/*'
      - invoke:
          title: invoke
          version: 2.0.0
          verb: keep
          target-url: $(target-url)$(request.path)$(request.search)
          header-control:
            type: blocklist
            values: []
          parameter-control:
            type: blocklist
            values: []
  properties:
    target-url:
      value: 'http://empresas-billing.apps.ocp.prod.gire.com'
      description: The URL of the target service
      encoded: false
  cors:
    enabled: true
  activity-log:
    enabled: true
    error-content: header
    success-content: activity
  application-authentication:
    certificate: false
  catalogs:
    produccion:
      properties:
        target-url: 'http://empresas-billing.apps.ocp.prod.gire.com'
securityDefinitions:
  Oauth:
    type: oauth2
    flow: application
    x-ibm-oauth-provider: oauth-rapipago
    tokenUrl: 'https://$(oauth-url)/oauth-rapipago/oauth2/token'
    scopes:
      openid: ''
  clientIdHeader:
    type: apiKey
    name: client-Id
    in: header
    x-key-type: client_id
security:
  - Oauth:
      - openid
